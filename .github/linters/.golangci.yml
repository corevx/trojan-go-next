version: "2"

run:
  timeout: 5m

linters:
  enable:
    - asciicheck
    - bodyclose
    - depguard
    - gocritic
    - govet
    - ineffassign
    - misspell
    - unconvert
    - whitespace
  disable:
    - errcheck
    - goprintffuncname
    - nilerr
    - rowserrcheck
    - staticcheck
    - unparam
    - unused
  exclusions:
    generated: strict
    rules:
      - path: \.pb\.go$
        linters:
          - all
    paths:
      - third_party

formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/p4gefau1t/trojan-go-next)
    goimports:
      local-prefixes:
        - github.com/p4gefau1t/trojan-go-next
