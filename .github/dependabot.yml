version: 2

updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - go
    commit-message:
      prefix: deps
      include: scope
    ignore:
      # smux v2 API 不兼容（Open → OpenStream），需手动迁移
      - dependency-name: "github.com/xtaci/smux"
        update-types: ["version-update:semver-major"]
    reviewers:
      - corevx

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: ci
      include: scope
    reviewers:
      - corevx
