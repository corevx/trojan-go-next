name: release-build

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Checkout tag
        run: |
          git fetch --depth=1 origin +refs/tags/*:refs/tags/*
          tag_name="${GITHUB_REF##*/}"
          echo Tag $tag_name
          git checkout $tag_name
          echo "TAG_NAME=${tag_name}" >> $GITHUB_ENV

      - name: Build
        run: |
          make release -j$(nproc)

      - name: Generate Release Notes
        run: |
          prev_tag=$(git tag --sort=-version:refname | sed -n '2p')
          echo "## What's Changed" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          if [ -n "$prev_tag" ]; then
            git log --pretty=format:"- %s" "${prev_tag}..${{ env.TAG_NAME }}" >> RELEASE_NOTES.md || true
            echo "" >> RELEASE_NOTES.md
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${prev_tag}...${{ env.TAG_NAME }}" >> RELEASE_NOTES.md
          else
            git log --pretty=format:"- %s" HEAD~10..HEAD >> RELEASE_NOTES.md || true
          fi

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG_NAME }}
          body_path: RELEASE_NOTES.md
          files: ./trojan-go-*.zip
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
