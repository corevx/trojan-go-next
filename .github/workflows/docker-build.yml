name: docker-build

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "docs/**"
    tags:
      - "v*.*.*"

permissions:
  packages: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v6

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare
        id: prepare
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "commit=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=snapshot" >> "$GITHUB_OUTPUT"
            echo "commit=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi
          echo "docker_platforms=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
          echo "docker_image=ghcr.io/${{ github.repository }}" >> "$GITHUB_OUTPUT"

      - name: Build and push docker image
        run: |
          TAG_ARGS="--tag ${{ steps.prepare.outputs.docker_image }}:${{ steps.prepare.outputs.version }}"
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            TAG_ARGS="$TAG_ARGS --tag ${{ steps.prepare.outputs.docker_image }}:latest"
          fi
          docker buildx build --platform ${{ steps.prepare.outputs.docker_platforms }} \
          --output "type=image,push=true" \
          $TAG_ARGS \
          --build-arg VERSION=${{ steps.prepare.outputs.version }} \
          --build-arg COMMIT=${{ steps.prepare.outputs.commit }} \
          --file Dockerfile .

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Test docker image
        run: |
          docker run --rm --entrypoint /usr/local/bin/trojan-go-next \
            ghcr.io/${{ github.repository }}:${{ needs.build.outputs.version || 'snapshot' }} -version
